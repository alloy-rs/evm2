name: Benchmark

permissions: {}

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: "sccache"
  RUSTFLAGS: -Csymbol-mangling-version=v0

jobs:
  codspeed:
    runs-on: depot-ubuntu-latest
    permissions:
      contents: read
    environment: codspeed
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install LLVM
        run: .github/scripts/install_llvm.sh ubuntu
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          cache-bin: false
      - name: Install cargo-codspeed
        uses: taiki-e/install-action@8b3c737da4b541bf0fb5a3e0488ff20535badac9 # v2.82.1
        with:
          tool: cargo-codspeed
      - name: Build the benchmark target
        run: cargo codspeed build --profile profiling -p evm2-cli --features jit --bench evm
      - name: Run the benchmarks
        uses: CodSpeedHQ/action@a4a36bb07c0638b0b4ca52bf1f3dad1b4289e52f # v4.18.1
        with:
          run: cargo codspeed run -p evm2-cli --bench evm
          mode: instrumentation
          token: ${{ secrets.CODSPEED_TOKEN }}
