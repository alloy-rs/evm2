name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: "sccache"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  matrices:
    name: build matrices
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      test-matrix: ${{ steps.gen.outputs.test-matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Generate matrices
        id: gen
        shell: bash
        run: |
          output=$(python3 .github/scripts/matrices.py)
          printf '::debug::test-matrix=%s\n' "$output"
          printf 'test-matrix=%s\n' "$output" >> "$GITHUB_OUTPUT"

  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner_label }}
    needs: matrices
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrices.outputs.test-matrix) }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install LLVM
        if: ${{ matrix.os == 'ubuntu' }}
        run: .github/scripts/install_llvm.sh ubuntu
      - name: Install LLVM
        if: ${{ matrix.os == 'macos' }}
        run: .github/scripts/install_llvm.sh macos
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        if: ${{ !matrix.target }}
        with:
          toolchain: ${{ matrix.rust }}
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        if: ${{ matrix.target }}
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
        if: runner.os == 'Linux'
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          cache-bin: false
      - uses: taiki-e/install-action@16a76bb73558798e4218983c40c25fee9f2f99a8 # nextest
        if: ${{ !matrix.command || matrix.command == 'nextest' }}
      - uses: taiki-e/install-action@867989a7645cb8230b1c87a12c07c4bfaf9a7d8c # cross
        if: ${{ matrix.command == 'cross-test' }}
      - uses: taiki-e/install-action@f8f9a96a3ddf6d0f5787449860fc7d72ae41f4b4 # wasmtime
        if: ${{ matrix.command == 'wasm-test' }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        if: ${{ matrix.kind == 'eest' }}
      - name: Download EEST fixtures
        if: ${{ matrix.kind == 'eest' }}
        shell: bash
        run: |
          if [[ "${{ matrix.fixture }}" == "devnet" ]]; then
            export DEVNET_VERSION="tests-glamsterdam-devnet%40v6.0.0"
            export DEVNET_TAR="fixtures_glamsterdam-devnet.tar.gz"
            export EVM2_STATETEST_DEVNET_ONLY=1
          fi
          ./scripts/setup_test_fixtures.py
      - name: ${{ matrix.kind }}
        if: ${{ !matrix.command || matrix.command == 'nextest' }}
        shell: bash
        run: |
          package_flags=(--workspace)
          if [[ -n "${{ matrix.cxx }}" ]]; then
            export CXX="${{ matrix.cxx }}"
            cargo clean -p mcl_rust
          fi
          extra_flags=()
          if [[ "${{ matrix.kind }}" == "eest" ]]; then
            package_flags=(-p evm2-eest)
            extra_flags+=(--ignore-default-filter)
            extra_flags+=(-E 'not test(/::(?:jit|aot)(?:$|::)/)')
          elif [[ "${{ matrix.os }}" == "windows" ]]; then
            package_flags+=(
              --exclude evm2-jit
              --exclude evm2-jit-*
            )
          fi
          if [[ "${{ matrix.fixture }}" == "devnet" ]]; then
            export EVM2_STATETEST_ROOT="test-fixtures/devnet/state_tests"
            export EVM2_BLOCKCHAINTEST_ROOT="test-fixtures/devnet/blockchain_tests"
          fi
          cargo nextest --profile ci run "${package_flags[@]}" --no-fail-fast ${{ matrix.flags }} "${extra_flags[@]}"
      - name: cross test
        if: ${{ matrix.command == 'cross-test' }}
        shell: bash
        run: |
          if [[ -n "${{ matrix.cxx }}" ]]; then
            export CXX="${{ matrix.cxx }}"
          fi
          cross test --workspace --exclude evm2-eest --target ${{ matrix.target }} --no-fail-fast --lib --bins --tests ${{ matrix.flags }}
      - name: wasm build
        if: ${{ matrix.command == 'build' }}
        shell: bash
        run: |
          if [[ -n "${{ matrix.cxx }}" ]]; then
            export CXX="${{ matrix.cxx }}"
          fi
          cargo build -p evm2 --target ${{ matrix.target }} ${{ matrix.flags }}
      - name: wasm test
        if: ${{ matrix.command == 'wasm-test' }}
        env:
          CARGO_TARGET_WASM32_WASIP1_RUNNER: wasmtime
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo test -p evm2 --target ${{ matrix.target }} --no-fail-fast --lib --tests ${{ matrix.flags }}
      - name: doctest
        if: ${{ matrix.kind == 'test' && !matrix.target }}
        run: cargo test --workspace ${{ matrix.flags }} --doc

  jit:
    name: jit ${{ matrix.os }} ${{ matrix.mode }}
    runs-on: ${{ matrix.runner_label }}
    timeout-minutes: 120
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu
            runner_label: depot-ubuntu-latest-4
            mode: jit
            subset: all
            filter: test(statetests::jit)
          - os: ubuntu
            runner_label: depot-ubuntu-latest-4
            mode: aot
            subset: ci-aot
            filter: test(statetests::aot)
          - os: macos
            runner_label: depot-macos-latest
            mode: jit
            subset: ci-smoke
            filter: test(statetests::jit)
    steps:
      - uses: actions/checkout@v6
      - name: Install LLVM
        if: ${{ matrix.os == 'ubuntu' }}
        run: .github/scripts/install_llvm.sh ubuntu
      - name: Install LLVM
        if: ${{ matrix.os == 'macos' }}
        run: .github/scripts/install_llvm.sh macos
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
        if: runner.os == 'Linux'
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-bin: false
      - uses: taiki-e/install-action@nextest
      - uses: astral-sh/setup-uv@v7
      - name: Download EEST fixtures
        run: ./scripts/setup_test_fixtures.py
      - name: eest ${{ matrix.mode }}
        env:
          EVM2_COMPILED_EEST_SUBSET: ${{ matrix.subset }}
        run: |
          cargo nextest --profile ci run -p evm2-eest --features jit --test eest \
            --ignore-default-filter --no-fail-fast -E "${{ matrix.filter }}"

  no-std:
    name: no_std ${{ matrix.target }}
    runs-on: depot-ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: ["riscv32imac-unknown-none-elf", "riscv64imac-unknown-none-elf"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          cache-bin: false
      - name: check
        run: cargo build -p evm2 --target ${{ matrix.target }} --no-default-features

  feature-checks:
    name: features ${{ matrix.flags }}
    runs-on: depot-ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        flags: ["", "--all-targets"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install LLVM
        run: .github/scripts/install_llvm.sh ubuntu
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - uses: taiki-e/install-action@dbb49279d79bb6825e754b75c8278b7619be13d2 # cargo-hack
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          cache-bin: false
      - name: cargo hack
        run: cargo hack check --workspace --each-feature --skip nightly ${{ matrix.flags }}

  feature-propagation:
    runs-on: depot-ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: taiki-e/cache-cargo-install-action@417450f3c33ee20393705369577571770643d4c7 # v3.0.7
        with:
          tool: zepter
      - name: Eagerly pull dependencies
        run: cargo generate-lockfile
      - run: zepter run check

  examples:
    runs-on: depot-ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          cache-bin: false
      - name: Check examples
        run: cargo build --workspace --examples

  typos:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2

  clippy:
    runs-on: depot-ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install LLVM
        run: .github/scripts/install_llvm.sh ubuntu
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          components: clippy
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          cache-bin: false
      - run: cargo clippy --workspace --all-targets --all-features
        env:
          RUSTFLAGS: -Dwarnings

  docs:
    runs-on: depot-ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install LLVM
        run: .github/scripts/install_llvm.sh ubuntu
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          cache-bin: false
      - name: Build documentation
        run: cargo doc --workspace --all-features --no-deps --document-private-items

  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  deny:
    permissions:
      contents: read
    uses: tempoxyz/ci/.github/workflows/deny.yml@934b6a6317ac26272eaecf0d265472f4105c99d6 # main

  ci-success:
    name: ci success
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
    needs:
      - matrices
      - test
      - jit
      - no-std
      - feature-checks
      - feature-propagation
      - examples
      - typos
      - clippy
      - docs
      - fmt
      - deny
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
