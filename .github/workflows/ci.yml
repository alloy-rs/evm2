name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  matrices:
    name: build matrices
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      test-matrix: ${{ steps.gen.outputs.test-matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Generate matrices
        id: gen
        shell: bash
        run: |
          output=$(python3 .github/scripts/matrices.py)
          printf '::debug::test-matrix=%s\n' "$output"
          printf 'test-matrix=%s\n' "$output" >> "$GITHUB_OUTPUT"

  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner_label }}
    needs: matrices
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrices.outputs.test-matrix) }}

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        if: ${{ !matrix.target }}
        with:
          toolchain: ${{ matrix.rust }}
      - uses: dtolnay/rust-toolchain@master
        if: ${{ matrix.target }}
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
      - uses: rui314/setup-mold@v1
        if: runner.os == 'Linux'
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-bin: false
      - uses: taiki-e/install-action@nextest
        if: ${{ !matrix.command || matrix.command == 'nextest' }}
      - uses: taiki-e/install-action@cross
        if: ${{ matrix.command == 'cross-test' }}
      - uses: taiki-e/install-action@wasmtime
        if: ${{ matrix.command == 'wasm-test' }}
      - uses: astral-sh/setup-uv@v7
        if: ${{ matrix.kind == 'eest' }}
      - name: Download EEST fixtures
        if: ${{ matrix.kind == 'eest' }}
        shell: bash
        run: |
          if [[ "${{ matrix.fixture }}" == "devnet" ]]; then
            export DEVNET_VERSION="snobal-devnet-6%40v1.1.0"
            export DEVNET_TAR="fixtures_snobal-devnet-6.tar.gz"
            export EVM2_STATETEST_DEVNET_ONLY=1
          fi
          ./scripts/setup_test_fixtures.py
      - name: ${{ matrix.kind }}
        if: ${{ !matrix.command || matrix.command == 'nextest' }}
        shell: bash
        run: |
          if [[ -n "${{ matrix.cxx }}" ]]; then
            export CXX="${{ matrix.cxx }}"
            cargo clean -p mcl_rust
          fi
          extra_flags=()
          if [[ "${{ matrix.kind }}" == "eest" ]]; then
            extra_flags+=(-p evm2-eest --ignore-default-filter)
          fi
          if [[ "${{ matrix.fixture }}" == "devnet" ]]; then
            export EVM2_STATETEST_ROOT="test-fixtures/devnet/state_tests"
            export EVM2_BLOCKCHAINTEST_ROOT="test-fixtures/devnet/blockchain_tests"
          fi
          if [[ "${{ runner.os }}" == "Windows" && "${{ matrix.kind }}" == "eest" ]]; then
            export RUSTFLAGS="-C link-arg=/STACK:8388608"
          fi
          cargo-nextest nextest run --workspace --no-fail-fast ${{ matrix.flags }} "${extra_flags[@]}"
      - name: cross test
        if: ${{ matrix.command == 'cross-test' }}
        shell: bash
        run: |
          if [[ -n "${{ matrix.cxx }}" ]]; then
            export CXX="${{ matrix.cxx }}"
          fi
          cross test --workspace --exclude evm2-eest --target ${{ matrix.target }} --no-fail-fast --lib --bins --tests ${{ matrix.flags }}
      - name: wasm build
        if: ${{ matrix.command == 'build' }}
        shell: bash
        run: |
          if [[ -n "${{ matrix.cxx }}" ]]; then
            export CXX="${{ matrix.cxx }}"
          fi
          cargo build -p evm2 --target ${{ matrix.target }} ${{ matrix.flags }}
      - name: wasm test
        if: ${{ matrix.command == 'wasm-test' }}
        env:
          CARGO_TARGET_WASM32_WASIP1_RUNNER: wasmtime
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo test -p evm2 --target ${{ matrix.target }} --no-fail-fast --lib --tests ${{ matrix.flags }}
      - name: doctest
        if: ${{ matrix.kind == 'test' && !matrix.target }}
        run: cargo test --workspace ${{ matrix.flags }} --doc

  no-std:
    name: no_std ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target: ["riscv32imac-unknown-none-elf", "riscv64imac-unknown-none-elf"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-bin: false
      - name: check
        run: cargo build -p evm2 --target ${{ matrix.target }} --no-default-features

  feature-checks:
    name: features ${{ matrix.flags }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        flags: ["", "--all-targets"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
      - uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-bin: false
      - name: cargo hack
        run: cargo hack check --workspace --each-feature --skip nightly ${{ matrix.flags }}

  feature-propagation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: zepter
      - name: Eagerly pull dependencies
        run: cargo generate-lockfile
      - run: zepter run check

  examples:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-bin: false
      - name: Check examples
        run: cargo build --workspace --examples

  typos:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: crate-ci/typos@v1

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: rui314/setup-mold@v1
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-bin: false
      - run: cargo clippy --workspace --all-targets --all-features

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: rui314/setup-mold@v1
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-bin: false
      - name: Build documentation
        run: cargo doc --workspace --all-features --no-deps --document-private-items

  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  deny:
    uses: tempoxyz/ci/.github/workflows/deny.yml@main

  ci-success:
    name: ci success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - matrices
      - test
      - no-std
      - feature-checks
      - feature-propagation
      - examples
      - typos
      - clippy
      - docs
      - fmt
      - deny
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
