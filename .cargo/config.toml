[alias]
cl = "clippy --workspace --all-features --all-targets"
docs = "doc --workspace --all-features --no-deps --document-private-items"
cli = "nextest run -p evm2-cli --features jit --bin evm2"
t = "nextest run --workspace"
eest = "nextest run -p evm2-eest --features jit --lib --ignore-default-filter"
st = "nextest run -p evm2-eest --features jit --test eest --ignore-default-filter"
