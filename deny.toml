[advisories]
version = 2
yanked = "warn"
ignore = [
    "RUSTSEC-2024-0436", # paste - no longer maintained
    # `proc-macro-error2` is unmaintained - transitive dependency
    "RUSTSEC-2026-0173",
]

[bans]
multiple-versions = "allow"
wildcards = "deny"
highlight = "all"

[licenses]
confidence-threshold = 0.9
# copyleft = "deny"

allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "LGPL-3.0-or-later",
]

exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "LicenseRef-ring"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    "https://github.com/DaniPopes/algebra",
    "https://github.com/tokio-rs/bytes",
]
