[package]
name = "evm2"
description = "Experimental EVM interpreter."

version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
evm2-macros.workspace = true

alloy-eips = { version = "2.0.4", default-features = false }
alloy-primitives.workspace = true
alloy-rlp.workspace = true
alloy-trie = { workspace = true, features = ["ethereum"] }
thiserror.workspace = true

# no_std
once_cell = { workspace = true, features = ["alloc"] }
paste.workspace = true

# "serde"
serde = { workspace = true, features = ["derive", "alloc"], optional = true }

[dev-dependencies]
alloy-consensus = "2.0.4"
serde_json.workspace = true

[[example]]
name = "registry_tx_handler"
path = "examples/registry/tx_handler.rs"
doc-scrape-examples = true

[[example]]
name = "registry_custom_handler"
path = "examples/registry/custom_handler.rs"
doc-scrape-examples = true

[[example]]
name = "e2e_transfer_sstore"
path = "examples/e2e_transfer_sstore.rs"
doc-scrape-examples = true

[features]
default = ["std"]
std = []

nightly = []
serde = ["dep:serde", "alloy-primitives/serde"]
