[profile.default]
default-filter = "not package(evm2-eest)"
slow-timeout = { period = "60s", terminate-after = 1 }
status-level = "leak"

[profile.ci]
default-filter = "not package(evm2-eest)"
fail-fast = false
status-level = "all"

# Run known-slow statetest groups first so they do not hold up the end of a run.
[[profile.default.overrides]]
filter = 'test(/stTimeConsuming|vmPerformance|50000|test_valid|test_many|until_out_of_gas/)'
priority = 2

[[profile.default.overrides]]
filter = 'test(blockchain_tests::)'
priority = 1

[[profile.default.overrides]]
filter = 'test(/::(?:jit|aot)(?:$|::)/)'
slow-timeout = { period = "3600s", terminate-after = 1 }
threads-required = "num-cpus"

[[profile.ci.overrides]]
filter = 'test(/::(?:jit|aot)(?:$|::)/)'
slow-timeout = { period = "3600s", terminate-after = 1 }
threads-required = "num-cpus"
