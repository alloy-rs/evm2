[workspace]
members = ["crates/evm2", "crates/evm2-macros", "crates/evm2-statetest"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
authors = ["Dani Popescu <dani@popes.dev>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/danipopes/evm2"
repository = "https://github.com/danipopes/evm2"

[workspace.lints.clippy]
dbg-macro = "warn"
manual-string-new = "warn"
uninlined-format-args = "warn"
use-self = "warn"
redundant-clone = "warn"
missing-const-for-fn = "warn"

[workspace.lints.rust]
missing-copy-implementations = "warn"
missing-debug-implementations = "warn"
missing-docs = "warn"
rust-2018-idioms = "warn"
unreachable-pub = "warn"
unused-must-use = "warn"
redundant-lifetimes = "warn"
unnameable-types = "warn"

[workspace.lints.rustdoc]
all = "warn"

[workspace.dependencies]
evm2-macros = { path = "crates/evm2-macros" }

alloy-primitives = { version = "1.5.7", default-features = false }
alloy-rlp = { version = "0.3", default-features = false }
alloy-trie = { version = "0.9", default-features = false }

indicatif = "0.18"
k256 = "0.13"
libtest-mimic = "0.8"
once_cell = { version = "1.21", default-features = false }
paste = "1.0"
serde = { version = "1.0", default-features = false }
serde_json = "1.0"
thiserror = { version = "2.0", default-features = false }
walkdir = "2.5"

proc-macro2 = "1.0"
quote = "1.0"
syn = "2.0"

[profile.release]
opt-level = 3
panic = "abort"
# lto = "thin"
