[workspace]
members = ["crates/evm2"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
authors = ["Dani Popescu <dani@popes.dev>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/danipopes/evm2"
repository = "https://github.com/danipopes/evm2"

[workspace.dependencies]
alloy-primitives = { version = "1.5.7", default-features = false }

[profile.release]
opt-level = 3
panic = "abort"
# lto = "thin"
